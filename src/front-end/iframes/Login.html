<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../public/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="../styles/login_style.css" />
    <link rel="stylesheet" href="../styles/msj.css" />
    <title>Iniciar Sesión - SBIRE</title>
</head>

<body>
    <div class="login-container">
        <div class="login-card">


            <h2>¡Te damos la bienvenida!</h2>
            <p class="subtitle">Ingresá tus credenciales para acceder a la plataforma.</p>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="dni">DNI</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">person</span>
                        <input type="text" id="dni" placeholder="Ej. 12345678" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="clave">Clave</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">lock</span>
                        <input type="password" id="clave" placeholder="••••••••" required
                            autocomplete="current-password">
                    </div>
                </div>

                <div id="mensaje" class="message-container"></div>

                <button type="submit" id="btnLogin" class="btn-login">
                    Iniciar Sesión <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="../controllers/login_controller.js"></script>
</body>

</html>
