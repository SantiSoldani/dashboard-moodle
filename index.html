<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="src/front-end/controllers/iframe_handler.js"></script>
    <link rel="icon" href="src/front-end/public/icon.png" type="image/png">
    <title>Document</title>
</head>

<body>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f4f6f9;
            color: #333;
            min-height: 100vh;
        }

        .iframe_container {
            width: 100%;
            height: 100vh;
            border: none;
            margin: 0;
            max-width: 100%;
            overflow: hidden;
        }

        .iframe_container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .iframe_container {
                min-height: 70vh;
            }
        }
    </style>
    <div id="iframe_container" class="iframe_container">

    </div>

</body>

</html>
